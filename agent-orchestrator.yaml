# Workspace 2.0 — Agent Orchestrator Configuration
# Aria (WSL2) is the primary execution environment

port: 3000

defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers:
    - telegram

# Notification routing by priority
notificationRouting:
  urgent:
    - telegram
  action:
    - telegram
  warning:
    - telegram
  info:
    - telegram

# Notifier configurations
notifiers:
  telegram:
    plugin: telegram
    botToken: "8779934076:AAG7PB3b1zmOKkQLCBuSlMMhChMj5lI_EuE"
    chatId: "1316861572"

# Default reactions
reactions:
  ci-failed:
    auto: true
    action: send-to-agent
    message: "CI is failing on your PR. Run `gh pr checks` to see the failures, fix them, and push."
    retries: 2
    escalateAfter: 2
  changes-requested:
    auto: true
    action: send-to-agent
    message: "There are review comments on your PR. Address each one, push fixes, and reply."
    escalateAfter: "30m"
  approved-and-green:
    auto: false
    action: notify
    priority: action
  agent-stuck:
    auto: true
    action: notify
    priority: urgent
  agent-needs-input:
    auto: true
    action: notify
    priority: urgent
  agent-exited:
    auto: true
    action: notify
    priority: urgent
  all-complete:
    auto: true
    action: notify
    priority: info
    includeSummary: true

# Projects — starting with beacon (top priority)
projects:
  beacon:
    repo: framazz6ai/beacon
    path: ~/workspace/projects/beacon
    defaultBranch: master
    scm:
      plugin: github
    tracker:
      plugin: github
    agentConfig:
      permissions: skip

# Traffic Warden — Priority Scheduler
warden:
  maxConcurrentSessions: 3
  resourceThresholds:
    minFreeRamMB: 2048
    maxCpuLoad: 0.85
    minFreeDiskGB: 10
  tickIntervalMs: 30000
